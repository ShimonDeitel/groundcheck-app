name: Groundcheck
options:
  bundleIdPrefix: com.shimondeitel.groundcheck
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  Groundcheck:
    type: application
    platform: iOS
    sources:
      - path: Groundcheck
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.groundcheck
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: Groundcheck/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  GroundcheckTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: GroundcheckTests
      - path: Groundcheck.storekit
    dependencies:
      - target: Groundcheck
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.groundcheck.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  GroundcheckUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: GroundcheckUITests
    dependencies:
      - target: Groundcheck
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.groundcheck.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  Groundcheck:
    build:
      targets:
        Groundcheck: all
        GroundcheckTests: [test]
        GroundcheckUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: Groundcheck.storekit
    test:
      config: Debug
      storeKitConfiguration: Groundcheck.storekit
      targets:
        - GroundcheckTests
        - GroundcheckUITests
    archive:
      config: Release
